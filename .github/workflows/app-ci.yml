name: App CI

on:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.*"
      - "eslint.config.*"
      - ".github/workflows/app-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.*"
      - "eslint.config.*"
      - ".github/workflows/app-ci.yml"

permissions:
  contents: read
  packages: read

jobs:
  app-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@brij-digital"

      - name: Install Dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
