name: Protocol Pack CI

on:
  pull_request:
    paths:
      - "aidl/**"
      - "public/idl/**"
      - "protocol-packs/**"
      - "scripts/check-protocol-packs.mjs"
      - "scripts/compile-aidl.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/protocol-pack-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "aidl/**"
      - "public/idl/**"
      - "protocol-packs/**"
      - "scripts/check-protocol-packs.mjs"
      - "scripts/compile-aidl.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/protocol-pack-ci.yml"

jobs:
  protocol-pack-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Verify AIDL Generated Outputs
        run: npm run aidl:check

      - name: Run Protocol Pack Checks
        run: npm run pack:check
