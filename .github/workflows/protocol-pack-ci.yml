name: Protocol Pack CI

on:
  pull_request:
    paths:
      - "aidl/**"
      - "public/idl/**"
      - "protocol-packs/**"
      - "scripts/check-protocol-packs.mjs"
      - "scripts/lint-protocol-packs.mjs"
      - "scripts/report-pack-complexity.mjs"
      - "scripts/compile-aidl.mjs"
      - "scripts/sync-runtime-schemas.mjs"
      - "protocol-packs/complexity-budget.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/protocol-pack-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "aidl/**"
      - "public/idl/**"
      - "protocol-packs/**"
      - "scripts/check-protocol-packs.mjs"
      - "scripts/lint-protocol-packs.mjs"
      - "scripts/report-pack-complexity.mjs"
      - "scripts/compile-aidl.mjs"
      - "scripts/sync-runtime-schemas.mjs"
      - "protocol-packs/complexity-budget.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/protocol-pack-ci.yml"

permissions:
  contents: read
  packages: read

jobs:
  protocol-pack-checks:
    runs-on: ubuntu-latest
    env:
      SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout apppack-runtime
        uses: actions/checkout@v4
        with:
          repository: brij-digital/apppack-runtime
          path: apppack-runtime-source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@brij-digital"

      - name: Install Dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Check Runtime-Owned Schemas
        env:
          APPPACK_RUNTIME_DIR: ${{ github.workspace }}/apppack-runtime-source
        run: npm run schemas:check

      - name: Runtime Validate Generated Pack Contracts
        run: node apppack-runtime-source/scripts/check-pack-contracts.mjs --pack-dir public/idl

      - name: Verify AIDL Generated Outputs
        run: npm run aidl:check

      - name: Smoke Load Wallet Pack Metadata
        run: npm run smoke:pack-metadata

      - name: Run Protocol Pack Checks
        run: npm run pack:check

      - name: Check Pack Topology
        run: npm run pack:topology:check

      - name: Run Protocol Pack Lint
        run: npm run pack:lint

      - name: Run Complexity Budget Report
        run: npm run pack:complexity:enforce

      - name: Run RPC Simulation + Parity Checks
        if: ${{ env.SOLANA_RPC_URL != '' }}
        run: npm run pack:rpc-check
